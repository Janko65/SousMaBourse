<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Budget</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="splashScreen">
  <img src="logo.png" alt="Logo" id="splashLogo">
</div>

<header class="top">
  <div class="banner">
    <img src="bandeau.png" alt="Banner">
  </div>

  <div class="period-summary">
    Du <span id="periodStart">x</span> au <span id="periodEnd">x</span>,
    vos dépenses seront de
    <strong id="monthlyTotal">TANT</strong>.
  </div>

  <div class="today-remaining">
    <div id="dailyAmount" class="amount">0€</div>
    <div class="sub">
      de dispo par jour pour ne pas être ric-rac à la fin du mois!
    </div>
  </div>

  <div class="top-actions compact">
    <button id="periodBtn" class="secondary">Période</button>
    <button id="addTx" class="primary">Mouvement d'argent</button>
    <button id="moreBtn" class="secondary">Plus…</button>
  </div>
</header>

<main id="txList" class="middle"></main>

<footer class="bottom">
  <div id="balanceDisplay" class="balance-editable">
    <div class="amount">0€</div>
    <div class="sub">
      Indiquez le montant de votre compte bancaire et cochez les cases si les opérations sont passées
    </div>
  </div>
</footer>

<dialog id="balanceModal">
  <input id="balanceInput" type="number" inputmode="decimal" placeholder="Montant du solde">
  <button id="saveBalance" class="primary full">Valider</button>
</dialog>

<dialog id="txModal">
  <input id="txAmount" type="number" inputmode="decimal" placeholder="Montant">
  <input id="txTitle" placeholder="Titre de la transaction">
  <select id="txDay">
    <option value="" disabled selected>Date de la transaction</option>
  </select>
  <select id="txType">
    <option value="debit">Débit</option>
    <option value="credit">Revenu</option>
  </select>

  <div class="modal-actions">
    <button id="cancelTx" class="secondary">Annuler</button>
    <button id="saveTx" class="primary">Sauvegarder</button>
  </div>

  <button id="deleteTx" class="danger full hidden">Supprimer</button>
</dialog>

<dialog id="periodModal">
  <label class="period-label" for="startDay">
    Début du mois (Jour de paie ?) :
  </label>
  <select id="startDay"></select>
  <button id="savePeriod" class="primary full">Valider</button>
</dialog>

<dialog id="moreModal">
  <button id="backupData" class="primary full">Sauvegarder les données</button>
  <button id="restoreData" class="secondary full">Restaurer des données</button>
  <button id="toggleTheme" class="secondary full">Changer le thème</button>
  <button id="toggleLang" class="secondary full">English</button>

  <select id="currencySelect" class="secondary full">
    <option value="EUR">€ (EUR)</option>
    <option value="USD">$ (USD)</option>
    <option value="GBP">£ (GBP)</option>
  </select>

  <!-- NOUVEAU BOUTON MISE À JOUR -->
  <button id="updateApp" class="primary full">Mise à jour</button>

  <button id="hardReset" class="danger full">Reset</button>
</dialog>

<script src="app.js"></script>
</body>
</html>
